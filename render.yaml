version: "1"
projects:
- name: My project
  environments:
  - name: Production
    services:
    - type: web
      name: california-house-price
      runtime: python
      repo: https://github.com/Mayuri-Nag/Californiahouseprice
      plan: free
      region: oregon
      buildCommand: pip install -r requirements.txt
      startCommand: gunicorn app:app
      autoDeployTrigger: commit
