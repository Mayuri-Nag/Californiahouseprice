<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>California House Price Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #151820;
      --border:  #252a35;
      --accent:  #e8c97e;
      --accent2: #7eb8e8;
      --text:    #e8e6e0;
      --muted:   #6b7280;
      --success: #7ee8a2;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,201,126,0.08) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px);
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.7s ease both;
    }
    header .eyebrow {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      line-height: 1.15;
    }
    header h1 em { font-style: italic; color: var(--accent); }
    header p {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 40px 40px 36px;
      animation: fadeUp 0.7s ease 0.15s both;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    label span {
      color: var(--accent2);
      margin-left: 4px;
      font-size: 9px;
    }

    input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,201,126,0.08);
    }
    input::placeholder { color: var(--muted); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    button[type="submit"]:hover { opacity: 0.88; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }

    .result-box {
      margin-top: 24px;
      padding: 20px 24px;
      border-radius: 2px;
      background: rgba(126,232,162,0.06);
      border: 1px solid rgba(126,232,162,0.25);
      animation: fadeUp 0.4s ease both;
    }
    .result-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .result-value {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--success);
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
      .card { padding: 28px 20px 24px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="eyebrow">ML Prediction Model</div>
    <h1>California House<br/><em>Price Estimator</em></h1>
    <p>Enter property features below to get an estimated median house value.</p>
  </header>

  <div class="card">
    <form action="/predict" method="POST">

      <div class="section-label">Property Features</div>

      <div class="grid">
        <div class="field">
          <label>Median Income <span>MedInc</span></label>
          <input type="number" name="MedInc" placeholder="e.g. 8.3252" step="any" required />
        </div>
        <div class="field">
          <label>House Age <span>years</span></label>
          <input type="number" name="HouseAge" placeholder="e.g. 41.0" step="any" required />
        </div>
        <div class="field">
          <label>Avg Rooms <span>AveRooms</span></label>
          <input type="number" name="AveRooms" placeholder="e.g. 6.984" step="any" required />
        </div>
        <div class="field">
          <label>Avg Bedrooms <span>AveBedrms</span></label>
          <input type="number" name="AveBedrms" placeholder="e.g. 2.023" step="any" required />
        </div>
        <div class="field">
          <label>Population <span>block</span></label>
          <input type="number" name="Population" placeholder="e.g. 322" step="any" required />
        </div>
        <div class="field">
          <label>Avg Occupancy <span>AveOccup</span></label>
          <input type="number" name="AveOccup" placeholder="e.g. 2.554" step="any" required />
        </div>
        <div class="field">
          <label>Latitude <span>°N</span></label>
          <input type="number" name="Latitude" placeholder="e.g. 37.88" step="any" required />
        </div>
        <div class="field">
          <label>Longitude <span>°W</span></label>
          <input type="number" name="Longitude" placeholder="e.g. -122.23" step="any" required />
        </div>
      </div>

      <div class="divider"></div>

      <button type="submit">Predict House Price</button>

    </form>

    {% if prediction_text %}
    <div class="result-box">
      <div class="result-label">Prediction Result</div>
      <div class="result-value">{{ prediction_text }}</div>
    </div>
    {% endif %}

  </div>

</body>
</html>
